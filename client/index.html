<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>rustcraft</title>
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }
      .overlay {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 12px;
        color: #fff; font-family: ui-monospace, Menlo, monospace;
        background: rgba(0, 0, 0, 0.55); cursor: pointer; z-index: 10;
        text-align: center;
      }
      .overlay h1 { font-size: 42px; margin: 0; letter-spacing: 2px; }
      .overlay p { margin: 0; opacity: 0.85; line-height: 1.6; }
      .overlay .error { color: #ff6b6b; }
      .hidden { display: none !important; }
      #crosshair {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        color: #fff; font-size: 22px; text-shadow: 0 0 3px #000;
        pointer-events: none; z-index: 5; user-select: none;
      }
      #hotbar {
        position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
        display: flex; gap: 4px; z-index: 5; pointer-events: none;
      }
      #hotbar .slot {
        width: 44px; height: 44px; box-sizing: border-box; position: relative;
        border: 2px solid rgba(255, 255, 255, 0.35); border-radius: 4px;
        background: rgba(0, 0, 0, 0.45); display: flex;
        align-items: center; justify-content: center;
      }
      #hotbar .slot.selected { border-color: #fff; background: rgba(0, 0, 0, 0.7); }
      #hotbar .slot.empty canvas { opacity: 0.25; }
      #hotbar .slot .count {
        position: absolute; right: 3px; bottom: 1px; color: #fff;
        font: bold 12px ui-monospace, Menlo, monospace; text-shadow: 1px 1px 0 #000;
      }
      #hotbar canvas { width: 32px; height: 32px; image-rendering: pixelated; }
      #debug {
        position: fixed; left: 8px; top: 8px; color: #fff; z-index: 5;
        font: 12px ui-monospace, Menlo, monospace; text-shadow: 0 0 3px #000;
        pointer-events: none; white-space: pre;
      }
      #hearts {
        position: fixed; right: 50%; bottom: 64px; margin-right: 8px;
        z-index: 5; font-size: 18px; letter-spacing: 2px; color: #e2312f;
        text-shadow: 0 0 3px #000; pointer-events: none; user-select: none;
      }
      #hearts .lost { color: rgba(255, 255, 255, 0.25); }
      #food {
        position: fixed; left: 50%; bottom: 64px; margin-left: 8px;
        z-index: 5; font-size: 15px; letter-spacing: 2px;
        text-shadow: 0 0 3px #000; pointer-events: none; user-select: none;
      }
      #food .lost { filter: grayscale(1) brightness(0.55); opacity: 0.5; }
      #bubbles {
        position: fixed; left: 50%; bottom: 90px; margin-left: 8px;
        z-index: 5; font-size: 13px; letter-spacing: 4px; color: #8fd0ff;
        text-shadow: 0 0 3px #000; pointer-events: none; user-select: none;
      }
      #bubbles .lost { color: rgba(255, 255, 255, 0.2); }
      #chat {
        position: fixed; left: 10px; bottom: 92px; z-index: 6; width: 400px;
        max-height: 40vh; overflow: hidden; display: flex; flex-direction: column;
        justify-content: flex-end; font: 13px ui-monospace, Menlo, monospace;
        color: #fff; pointer-events: none;
      }
      #chat div {
        background: rgba(0, 0, 0, 0.45); padding: 2px 8px; margin-top: 2px;
        border-radius: 3px; overflow-wrap: break-word; transition: opacity 1s;
      }
      #chat div.old { opacity: 0; }
      #chat.chatting div.old { opacity: 1; }
      #chat .who { color: #ffd66e; }
      #chat .system { color: #b9c0ff; font-style: italic; }
      #chat-input {
        position: fixed; left: 10px; bottom: 60px; z-index: 6; width: 400px;
        box-sizing: border-box; background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 3px;
        color: #fff; font: 13px ui-monospace, Menlo, monospace;
        padding: 6px 8px; outline: none;
      }
      #crafting {
        position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.78); border: 2px solid rgba(255, 255, 255, 0.35);
        border-radius: 6px; padding: 12px 16px; z-index: 9;
        color: #fff; font: 14px ui-monospace, Menlo, monospace;
      }
      #crafting .title { opacity: 0.7; font-size: 12px; text-align: center; }
      #crafting .recipe {
        display: flex; align-items: center; gap: 6px; padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 4px;
        margin-top: 8px; cursor: pointer; user-select: none;
      }
      #crafting .recipe:hover { background: rgba(255, 255, 255, 0.12); }
      #crafting .recipe.off { opacity: 0.35; cursor: default; }
      #crafting .recipe.off:hover { background: none; }
      #crafting .stack { display: flex; align-items: center; gap: 4px; }
      #crafting .arrow { opacity: 0.7; margin: 0 6px; }
      #crafting canvas { width: 28px; height: 28px; image-rendering: pixelated; }
      #vignette {
        position: fixed; inset: 0; z-index: 8; pointer-events: none;
        opacity: 0; transition: opacity 0.5s ease-out;
        box-shadow: inset 0 0 120px 40px rgba(190, 0, 0, 0.8);
      }
      #death {
        position: fixed; inset: 0; z-index: 9; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 10px; background: rgba(96, 0, 0, 0.55); text-align: center;
        color: #fff; font-family: ui-monospace, Menlo, monospace;
        user-select: none;
      }
      #death h1 { margin: 0; font-size: 46px; letter-spacing: 3px; text-shadow: 2px 2px 0 #000; }
      #death p { margin: 0; opacity: 0.9; }
      #death .hint { opacity: 0.6; font-size: 13px; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="crosshair" class="hidden">+</div>
    <div id="hotbar" class="hidden"></div>
    <div id="hearts" class="hidden"></div>
    <div id="food" class="hidden"></div>
    <div id="bubbles" class="hidden"></div>
    <div id="crafting" class="hidden"></div>
    <div id="chat"></div>
    <input id="chat-input" class="hidden" maxlength="200" autocomplete="off" spellcheck="false" />
    <div id="vignette"></div>
    <div id="death" class="hidden">
      <h1>you died</h1>
      <p id="death-cause"></p>
      <p class="hint">click to respawn</p>
    </div>
    <div id="debug" class="hidden"></div>
    <div id="overlay" class="overlay">
      <h1>RUSTCRAFT</h1>
      <p id="overlay-msg">loading…</p>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
